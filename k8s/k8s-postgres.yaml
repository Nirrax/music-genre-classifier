apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: music-classifier
data:
  POSTGRES_DB: "mydb"
  PGDATA: "/var/lib/postgresql/data/pgdata"

---
# Headless service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: music-classifier
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None

---
# Service pointing to primary (postgres-0) only
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: music-classifier
spec:
  selector:
    app: postgres
    apps.kubernetes.io/pod-index: "0"
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
# Service for replicas (load balances all pods)
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: music-classifier
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: music-classifier
spec:
  serviceName: postgres
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999

      initContainers:
        - name: init-postgres
          image: postgres:15
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          command:
            - bash
            - -c
            - |
              set -ex
              
              [[ $(hostname) =~ -([0-9]+)$ ]] || exit 1
              ordinal=${BASH_REMATCH[1]}
              
              echo "Pod ordinal: $ordinal"
              
              if [[ $ordinal -eq 0 ]]; then
                echo "PRIMARY: Will be initialized by main container"
              else
                echo "REPLICA: Setting up replication from primary"
              
                # Wait for primary
                echo "Waiting for primary to be ready..."
                for i in {1..60}; do
                  if pg_isready -h postgres-0.postgres.music-classifier.svc.cluster.local -U postgres 2>/dev/null; then
                    echo "Primary is ready!"
                    break
                  fi
                  echo "Attempt $i/60: Primary not ready yet..."
                  sleep 5
                done
              
                # Check if already initialized
                if [ -s "$PGDATA/PG_VERSION" ]; then
                  echo "Database already exists, skipping basebackup"
                else
                  echo "Initializing replica from primary..."
                  rm -rf ${PGDATA}/*
              
                  PGPASSWORD=$POSTGRES_PASSWORD pg_basebackup \
                    -h postgres-0.postgres.music-classifier.svc.cluster.local \
                    -D ${PGDATA} \
                    -U postgres \
                    -v -P -R \
                    -X stream \
                    -c fast
              
                  echo "Replica initialization complete!"
                fi
              fi
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      containers:
        - name: postgres
          image: postgres:15
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: mydb
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: config-script
              mountPath: /docker-entrypoint-initdb.d/01-configure-replication.sh
              subPath: configure-replication.sh
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: config-script
          configMap:
            name: postgres-init-script
            defaultMode: 0755

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: music-classifier
data:
  configure-replication.sh: |
    #!/bin/bash
    set -e
    
    echo "Configuring PostgreSQL for replication..."
    
    cat >> ${PGDATA}/postgresql.conf <<EOF
    
    # Replication settings
    wal_level = replica
    max_wal_senders = 5
    wal_keep_size = 128
    hot_standby = on
    max_replication_slots = 5
    EOF
    
    echo "host replication all all md5" >> ${PGDATA}/pg_hba.conf
    
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
        CREATE USER replicator WITH REPLICATION ENCRYPTED PASSWORD '${POSTGRES_PASSWORD}';
    EOSQL
    
    echo "Replication configuration complete!"