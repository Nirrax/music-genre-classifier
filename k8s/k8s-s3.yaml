apiVersion: v1
kind: ConfigMap
metadata:
  name: s3-config
  namespace: music-classifier
data:
  SERVICES: "s3"
  DEBUG: "1"
  DATA_DIR: "/var/lib/localstack"
  CORS_ALLOWED_ORIGINS: "*"
  CORS_ALLOWED_METHODS: "GET,PUT,POST,DELETE,HEAD,OPTIONS"
  CORS_ALLOWED_HEADERS: "*"

---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: music-classifier
spec:
  selector:
    app: localstack
  ports:
    - port: 4566
      targetPort: 4566
  clusterIP: None  # Headless service for StatefulSet
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: music-classifier
spec:
  selector:
    app: localstack
  ports:
    - port: 4566
      targetPort: 4566
      nodePort: 30456  # Optional: specify a port in range 30000-32767
      protocol: TCP
      name: localstack
  type: NodePort

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: localstack
  namespace: music-classifier
spec:
  serviceName: localstack
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:3.0  # Pin version instead of latest
          ports:
            - containerPort: 4566
              name: edge
          envFrom:
            - configMapRef:
                name: s3-config
            - secretRef:
                name: s3-secret
          volumeMounts:
            - name: localstack-storage
              mountPath: /var/lib/localstack
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "Waiting for LocalStack to be ready..."
                    timeout=60
                    while [ $timeout -gt 0 ]; do
                      if awslocal s3 ls >/dev/null 2>&1; then
                        break
                      fi
                      sleep 1
                      timeout=$((timeout - 1))
                    done
                    
                    echo "Creating S3 bucket..."
                    awslocal s3 ls s3://mp3files >/dev/null 2>&1 || \
                      awslocal s3 mb s3://mp3files
                    awslocal s3api put-bucket-cors --bucket mp3files --cors-configuration '{
                      "CORSRules": [
                        {
                          "AllowedOrigins": ["*"],
                          "AllowedMethods": ["GET", "PUT", "POST", "DELETE", "HEAD"],
                          "AllowedHeaders": ["*"],
                          "ExposeHeaders": ["ETag"]
                        }
                      ]
                    }'
                    echo "S3 bucket 'mp3files' ready."
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
  volumeClaimTemplates:
    - metadata:
        name: localstack-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi