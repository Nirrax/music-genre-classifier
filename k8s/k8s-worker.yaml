apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-config
  namespace: music-classifier
data:
  # RabbitMQ connection
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_QUEUE: "classifier.request.queue"
  RABBITMQ_EXCHANGE: "classifierExchange"
  RABBITMQ_ROUTING_KEY: "classifier.response"

  # S3/LocalStack connection
  AWS_ENDPOINT: "http://localstack:4566"
  S3_BUCKET: "mp3files"
  AWS_REGION: "us-east-1"

  # Health check port
  HEALTH_PORT: "8080"

---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: music-classifier
spec:
  selector:
    app: worker
  ports:
    - port: 8080
      targetPort: 8080
      name: health
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: music-classifier
spec:
#  We scale with HPA
#  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: music-genre-classifier-worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: health
          envFrom:
            - configMapRef:
                name: worker-config
            - secretRef:
                name: worker-secret
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: temp-storage
              mountPath: /app/temp
      volumes:
        - name: temp-storage
          emptyDir: {}

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: music-classifier
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60