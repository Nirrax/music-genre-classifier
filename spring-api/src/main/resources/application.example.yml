spring:
  datasource:
    write:
      jdbc-url: jdbc:postgresql://localhost:5432/mydb
      username:
      password:
      driver-class-name: org.postgresql.Driver
    read:
      jdbc-url: jdbc:postgresql://localhost:5432/mydb
      username:
      password:
      driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # create | update | validate | none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    port: 5672
    host: localhost
    username:
    password:
    exchangeName: classifierExchange
    inbound:
      queueName: classifier.response.queue
      routingKey: classifier.response
    outbound:
      routingKey: classifier.request


server:
  port: 8080
  servlet:
    context-path: /api
  error:
    whitelabel:
      enabled: false

logging:
  level:
    org.springframework: INFO
    com.example: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: true


jwt:
  secret:
  expiration: 300000
  refresh:
    expiration: 86400000

aws:
  s3:
    region: us-east-1
    endpoint: http://localhost:4566
    bucketName: mp3files
    credentials:
      accessKey:
      secretKey:
